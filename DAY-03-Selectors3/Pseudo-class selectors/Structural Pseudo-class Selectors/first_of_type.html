<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section h1:first-of-type{
            color: blueviolet;
        }
        section p:first-of-type{
            background-color:plum;
        }
        div{
            width:100px;
            height:100px
        }
        section div:first-of-type{
            background-color: aqua;
        }
        section h1:last-of-type{
            color: darkblue;
        }
        section p:last-of-type{
            background-color:skyblue ;
        }
        section div:last-of-type{
            background-color: greenyellow;
        }
    </style>
</head>
<body>
    <h1>structural pseudo-class selectors</h1>

    <section>

        <h1>Heading - 1</h1>
`       <p>Paragraph - 1</p>
        <div>Container - 1</div>
        
        <h1>Heading - 2</h1>
        <p>Paragraph - 2</p>
        <div>Container - 2</div>

        <h1>Heading - 3</h1>
        <p>Paragraph - 3</p>
        <div>Container - 3</div>
    </section>
</body>
</html>

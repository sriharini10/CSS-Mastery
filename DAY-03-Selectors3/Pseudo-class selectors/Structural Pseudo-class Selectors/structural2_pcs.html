<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div p:nth-child(5) {
        background-color: skyblue;
      }
      div p:nth-child(odd) {
        background-color: greenyellow;
      }
      div p:nth-child(even) {
        background-color: darksalmon;
      }
    </style>
  </head>
  <body>
    <h1>structural pseudo-class selectors</h1>
    <div>
      <p>Paragraph - 1</p>
      <p>Paragraph - 2</p>
      <p>Paragraph - 3</p>
      <p>Paragraph - 4</p>
      <p>Paragraph - 5</p>
      <p>Paragraph - 6</p>
      <p>Paragraph - 7</p>
      <p>Paragraph - 8</p>
      <p>Paragraph - 9</p>
      <p>Paragraph - 10</p>
    </div>
  </body>
</html>

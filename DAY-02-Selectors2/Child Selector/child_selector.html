<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        main > h1{
            color:darkmagenta;
        }
        div > h1{
            color:rgb(55, 226, 43);
        }
        main > article {
            background-color:skyblue;
        }
        main > aside > div > a{
            color:orangered;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>2.2 Child Selector(>)</h1>
    <h2>It will only target the direct child not the grand child</h2>

    <main>
        <h1>Heading-1</h1>
        <p>Paragraph-1</p>
        <div>
            <h1>Heading-2</h1>
            <p>Paragraph-2</p>
        </div>
        <article>
            <h1>Heading-3</h1>
        </article>
        <h1>Heading-4</h1>
        <aside>
            <div>
                <a href="">click me</a>
            </div>
        </aside>
    </main>
</body>
</html>

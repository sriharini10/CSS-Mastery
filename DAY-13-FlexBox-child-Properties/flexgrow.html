<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: Georgia, "Times New Roman", Times, serif;
      }
      .parent {
        width: 100%;
        height: 250px;
        border: 1px solid;
        display: flex;
        justify-content: space-around;
        align-items: center;
      }
      .box {
        width: 100px;
        height: 100px;
        background-color: teal;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 2px solid white;
      }
     .box:nth-child(3) {
        flex-grow: 2;
        flex-shrink: 2;
     }
     .box:nth-child(5){
        flex-grow: 3;
        flex-shrink: 7;
     }
    </style>
  </head>
  <body>
    <h1>Flex Child Property: flex-grow</h1>
    <div class="parent">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box">3</div>
      <div class="box">4</div>
      <div class="box">5</div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family:
          "Lucida Sans", "Lucida Sans Regular", "Lucida Grande",
          "Lucida Sans Unicode", Geneva, Verdana, sans-serif;
      }
      .parent{
        background-color: white;
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.5);
        width: 800px;
        height: 300px;
        display: flex; /*only for parent */
        justify-content: space-evenly;/*only for parent */
        align-items: center;/*only for parent */

      }
      .child{
        width: 100px;
        height: 100px;
        background-color: crimson;
        color: white;
        font-size: 20px;
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <h1>Flex box in CSS</h1>
    <div class="parent">
      <div class="child">Box-1</div>
      <div class="child">Box-2</div>
      <div class="child">Box-3</div>
      <div class="child">Box-4</div>
      <div class="child">Box-5</div>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
        margin:0;
        padding:0;
        box-sizing: border-box;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        }
        h1{
            text-align: center;
            margin-bottom: 20px;

        }
        .parent{
            width: 80%;
            height: 500px;
            border: 1px solid;
            margin:30px auto;
            position: relative;
        }
        .child{
            width: 120px;
            height: 100px;
            background-color: darkmagenta;
            color: white;
            text-align: center;
            line-height: 100px;
            position: absolute;
        }
        #child{

        }
        #child2{
            right: 0;

        }
        #child3{
            bottom:0;
            
        }
        #child4{
            right:0;
            bottom: 0;

        }
        #child5{
            left: 42%;
            bottom: 40%;
        }
        
    </style>

</head>
<body>
    <h1>Parent Relative and Child Absolute</h1>
    <div class="parent">
        <div class="child" id="child1">Child-1</div>
        <div class="child" id="child2">Child-2</div>
        <div class="child" id="child3">Child-3</div>
        <div class="child" id="child4">Child-4</div>
        <div class="child" id="child5">Child-5</div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            
            height: 100px;
            background-color: navy;
            animation:sizeSteps 5s steps(5)  ;
        }

        @keyframes sizeSteps {
            from{
                width: 0%;

            }
            to{
                width: 100%;
            }

            
        }
    </style>
</head>
<body>
    <h1>steps() timing-function demo</h1>
    <div class="box"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>

        /*Id selector*/

        #tvk{
            color: red;
            background-color: yellow;
        }

        /*class selector*/
        .tn{
            color: purple;
            background-color: antiquewhite;
            border: 1px solid rgb(128, 62, 0);
        }

        /*Tagname or element name selector*/
        div{
            width: 300px;
            height: 300px;
            background-color:aquamarine;
        }

        /*universal  selector*/

        *{
            background-color:grey;
        }

    </style>
</head>
<body>
    <h1 style="color: white;">1.Simple Selectors - id, class, tagname, universal</h1>

    <h2 id="tvk">Today TVK will win</h2>
    <h2>May be ADMK will win</h2>

    <hr>

    <p class="tn">ADMK</p>
    <p class="tn">DMK</p>
    <p class="tn">NTK</p>

    <hr>

    <div></div>

    <hr>

    <!--1st priority id-->
    <!--2nd priority class-->
    <!--3rd priority tagname or element name-->
    <!--4th priority universal-->
</body>
</html>

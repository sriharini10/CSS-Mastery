<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            font-size: 120px;
            /*background-image: linear-gradient(to right,crimson,grey);*/
            background-image: url(https://w0.peakpx.com/wallpaper/180/607/HD-wallpaper-sachin-tendulkar-sports-cricket-sachin-tendulkar.jpg);
            background-clip: text;
            color: transparent;
            
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }
        h3{
            font-size: 120px;
            background: linear-gradient(to right,crimson,blue);
            background-clip: text;
            color: transparent;
            
            
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
        }
    </style>
</head>
<body>
    <h2>Background clip</h2>
    <h1>Sachin: The Master Blaster</h1>
    <h3>He we apply the gradient in text</h3>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box{
            width: 100%;
            height: 100vh;
            border: 2px solid red;
            background-image: url(https://c4.wallpaperflare.com/wallpaper/101/583/796/cat-high-cool-cat-wallpaper-preview.jpg);
            background-repeat: no-repeat;
            background-position: center center; /*horizonal vertical*/
            background-size: contain;

        }
        h1{
            text-align: center;
            color: deeppink;
        }
        
    </style>
</head>
<body>
    <div class="box"><h1>Cats can Jump</h1></div>
    
</body>
</html>

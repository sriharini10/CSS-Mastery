<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .box{
            width: 100%;
            height: 100vh;
            border: 5px solid black;
            text-align: center;
            line-height: 100vh;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            background-attachment: fixed;
        }
        .h1{
            font-size: 100px;
            color: white;
        }

        #box1{
            background-image: url(https://i.pinimg.com/736x/eb/17/09/eb170953bfbc05c82a61bbd1c4506675.jpg);
        }
        #box2{
            background-image: url(https://i.pinimg.com/736x/80/48/9e/80489eb773230aec49d45787931b9b63.jpg);
        }
        #box3{
            background-image: url(https://i.pinimg.com/736x/c4/62/c0/c462c0d63bac075f2660f591f84a92f2.jpg);
        }
        #box4{
            background-image: url(https://i.pinimg.com/736x/14/27/58/1427586be74ac26b3a4979a7fd1ab52a.jpg);
        }
        #box5{
            background-image: url(https://wallpapercave.com/wp/wp5191760.jpg);
        }
    </style>
</head>
<body>
    <div class="box" id="box1"><h1>Shinchan</h1></div>
    <div class="box" id="box2"><h1>Chotta Bheem</h1></div>
    <div class="box" id="box3"><h1>Jackie Chan</h1></div>
    <div class="box" id="box4"><h1>Doreamon</h1></div>
    <div class="box" id="box5"><h1>Ninja Hatori</h1></div>
</body>
</html>

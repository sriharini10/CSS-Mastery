<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .parent{
            width: 70%;
            height: 400px;
            background-color: black;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            border-radius: 3px;
        }
        .box{
            width: 300px;
            height: 250px;
            background-color: orangered;
            color: white;
            font-size: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            transition: all 1s linear;
        }
        body{
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            height: 100vh;
        }
        #box1:hover{
            transform: rotate(180deg);
            border-radius: 50%;
        }
        #box2:hover{
            transform: rotateX(180deg);
            border-radius: 50%;
        }
        #box3:hover{
            transform: rotateY(180deg);
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <h1>transform : rotate(deg) property demo</h1>
    <div class="parent">
        <div class="box" id="box1">rotateZ()</div>
        <div class="box" id="box2">rotateX()</div>
        <div class="box" id="box3">rotateY()</div>
    </div>
</body>
</html>
